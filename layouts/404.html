{{ define "main" }}
  <section class="cb-404">
    <div class="cb-404-terminal">
      <div class="cb-code-bar" aria-hidden="true">
        <span class="cb-code-dots"><span></span><span></span><span></span></span>
        <span class="cb-code-lang">zsh</span>
      </div>
      <div class="cb-404-body">
        <p><span class="cb-footer-path">~/codebrewcyber</span> $ cat ./requested-page</p>
        <p class="cb-404-error">cat: ./requested-page: No such file or directory</p>
        <p><span class="cb-footer-path">~/codebrewcyber</span> $ echo $?</p>
        <p class="cb-404-error">404</p>
        <p>
          <span class="cb-footer-path">~/codebrewcyber</span> $
          <a href="{{ "/" | relURL }}">cd ~</a><span class="cb-type-cursor">_</span>
        </p>
      </div>
    </div>
  </section>
{{ end }}
