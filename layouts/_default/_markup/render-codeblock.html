{{- /* Overrides Blowfish v2 render-codeblock.html — re-sync if the theme module updates */ -}}
{{- $title := or .Attributes.title "" -}}
{{- $lang := or .Type "text" -}}
<div class="highlight-wrapper" data-lang="{{ $lang }}">
  {{- with $title -}}
    <div class="codeblock-title">
      {{- $title -}}
    </div>
  {{- end -}}
  <div class="cb-code-bar" aria-hidden="true">
    <span class="cb-code-dots"><span></span><span></span><span></span></span>
    <span class="cb-code-lang">{{ $lang }}</span>
  </div>
  {{- transform.Highlight .Inner $lang .Options -}}
</div>
